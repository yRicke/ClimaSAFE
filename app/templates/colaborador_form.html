{% extends 'base.html' %}

{% block title %}Colaborador | ClimaSAFE{% endblock %}

{% block content %}
<section class="panel form-panel">
    <h2>{% if object %}Editar colaborador{% else %}Novo colaborador{% endif %}</h2>
    <form method="post">
        {% csrf_token %}
        {{ form.as_p }}
        <div class="actions">
            <button type="submit" class="btn">Salvar</button>
            <a href="{% url 'colaborador_list' %}" class="btn btn-light">Cancelar</a>
        </div>
    </form>
</section>
{% endblock %}
