{% extends 'base.html' %}

{% block title %}Equipe | ClimaSAFE{% endblock %}

{% block content %}
<section class="panel form-panel">
    <h2>{% if object %}Editar equipe{% else %}Nova equipe{% endif %}</h2>
    <p class="hint">Vincule a equipe à fazenda correta para processamento de alertas em grupo.</p>
    <form method="post">
        {% csrf_token %}
        {{ form.as_p }}
        <div class="actions">
            <button type="submit" class="btn">Salvar</button>
            <a href="{% url 'equipe_list' %}" class="btn btn-light">Cancelar</a>
        </div>
    </form>
</section>
{% endblock %}
